<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天府都 公式ポータル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>天府都 公式ポータル</h1>
  </header>

  <main>
    <h2>天府都 主要施設一覧</h2>
    
    <div class="facility-list">
      
      <a href="detail-tenfu-heavy.html" class="card">
        <div class="card-logo">
          <img src="https://placehold.jp/120x120.png?text=Logo" alt="天府重工ロゴ">
        </div>
        <div class="card-content">
          <h3>天府重工株式会社</h3>
          <div>
            <span class="badge badge-area">臨海区</span>
            <span class="badge badge-genre">会社 / 製造業</span>
          </div>
          <p>天府都のインフラと造船を支える歴史ある重工業メーカー。近代化と共に歩んできた天府都を代表する企業の一つです。</p>
        </div>
      </a>

      <a href="#" class="card">
        <div class="card-logo">
          <img src="https://placehold.jp/120x120.png?text=School" alt="天府第一高校ロゴ">
        </div>
        <div class="card-content">
          <h3>天府第一高等学校</h3>
          <div>
            <span class="badge badge-area">中央区</span>
            <span class="badge badge-genre">学校 / 教育機関</span>
          </div>
          <p>創立100年を超える天府都トップの進学校。文武両道を掲げ、多くの政治家や実業家を輩出しています。</p>
        </div>
      </a>

    </div>
  </main>

</body>
</html>
